name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    name: Validate contracts and manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate frozen contracts
        run: python tests/validate_contracts.py

      - name: Validate plugin manifests
        shell: pwsh
        run: ./build/Validate-PluginManifests.ps1

      - name: Test repository tooling
        run: python -m unittest discover -s tests -p "test_*.py" -v

  automation:
    name: Test automation backend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Test automation solution
        shell: pwsh
        run: >-
          dotnet test
          plugins/akasha-genshin-automation/backend/AkashaAutomation.sln
          --configuration Release
          --nologo
