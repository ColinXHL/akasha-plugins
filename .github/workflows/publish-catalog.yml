name: Publish Catalog

on:
  workflow_run:
    workflows:
      - Validate
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_commit:
        description: "main commit SHA to publish; defaults to current main"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-catalog
  cancel-in-progress: false

jobs:
  publish:
    name: Publish catalog mirrors
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: catalog-publish
    steps:
      - name: Resolve source commit
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ inputs.source_commit }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            source_commit="$WORKFLOW_RUN_SHA"
          elif [ -n "$DISPATCH_SHA" ]; then
            source_commit="$DISPATCH_SHA"
          else
            source_commit="${{ github.sha }}"
          fi

          if [[ ! "$source_commit" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::source_commit must be a full 40-character Git SHA"
            exit 1
          fi
          echo "commit=${source_commit,,}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.source.outputs.commit }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Stage catalog
        shell: pwsh
        run: >-
          ./build/Publish-Catalog.ps1
          -SourceCommit "${{ steps.source.outputs.commit }}"

      - name: Verify staged catalog
        shell: pwsh
        run: >-
          ./build/Generate-RepositoryIndex.ps1
          -Commit "${{ steps.source.outputs.commit }}"
          -OutputPath "artifacts/expected-repo.json"
          -RequireReleaseIntegrity

      - name: Compare generated index
        shell: bash
        run: cmp artifacts/catalog/repo.json artifacts/expected-repo.json

      - name: Publish catalog branch to GitHub
        id: github_publish
        shell: bash
        env:
          CATALOG_ROOT: ${{ runner.temp }}/catalog-worktree
          SOURCE_COMMIT: ${{ steps.source.outputs.commit }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin catalog >/dev/null 2>&1; then
            git fetch origin catalog
            git worktree add -B catalog "$CATALOG_ROOT" origin/catalog
          else
            git worktree add --detach "$CATALOG_ROOT"
            git -C "$CATALOG_ROOT" switch --orphan catalog
            git -C "$CATALOG_ROOT" rm -rf . >/dev/null 2>&1 || true
          fi

          find "$CATALOG_ROOT" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a artifacts/catalog/. "$CATALOG_ROOT/"

          git -C "$CATALOG_ROOT" add --all
          if git -C "$CATALOG_ROOT" diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git -C "$CATALOG_ROOT" commit -m "catalog: publish ${SOURCE_COMMIT:0:12}"
            git -C "$CATALOG_ROOT" push origin HEAD:catalog
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "catalog_commit=$(git -C "$CATALOG_ROOT" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify CNB token
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if [ -z "$CNB_TOKEN" ]; then
            echo "::error::catalog-publish secret CNB_TOKEN is not configured"
            exit 1
          fi

      - name: Mirror catalog branch to CNB
        shell: bash
        env:
          CATALOG_ROOT: ${{ runner.temp }}/catalog-worktree
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          credential_file="$RUNNER_TEMP/cnb-git-credentials"
          cleanup_credentials() {
            rm -f "$credential_file"
            git config --global --unset-all credential.helper || true
          }
          trap cleanup_credentials EXIT

          git config --global credential.helper "store --file=$credential_file"
          printf "protocol=https\nhost=cnb.cool\nusername=cnb\npassword=%s\n\n" "$CNB_TOKEN" |
            git credential approve

          git -C "$CATALOG_ROOT" remote add cnb \
            "https://cnb.cool/AkashaNavigator/akasha-plugins"
          git -C "$CATALOG_ROOT" push cnb HEAD:catalog

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "### Catalog published"
            echo
            echo "- Source commit: \`${{ steps.source.outputs.commit }}\`"
            echo "- Catalog commit: \`${{ steps.github_publish.outputs.catalog_commit }}\`"
            echo "- GitHub and CNB catalog branches are synchronized."
          } >> "$GITHUB_STEP_SUMMARY"
