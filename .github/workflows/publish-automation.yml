name: Publish Automation Plugin

on:
  pull_request:
    paths:
      - "plugins/akasha-genshin-automation/**"
      - ".github/workflows/publish-automation.yml"
      - ".github/scripts/publish_cnb_release.py"
  push:
    branches:
      - main
    paths:
      - "plugins/akasha-genshin-automation/**"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create draft Releases"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: "automation-release-${{ github.ref }}"
  cancel-in-progress: false

env:
  PLUGIN_ID: akasha-genshin-automation

jobs:
  validate:
    name: Validate automation release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      tag: ${{ steps.manifest.outputs.tag }}
      asset: ${{ steps.manifest.outputs.asset }}
      draft: ${{ steps.manifest.outputs.draft }}
      prerelease: ${{ steps.manifest.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate repository and release manifest
        run: python build/repository_tool.py --root . validate

      - name: Resolve release metadata
        id: manifest
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRAFT_INPUT: ${{ inputs.draft }}
        run: |
          $manifest = Get-Content `
            "plugins/$env:PLUGIN_ID/manifest.json" `
            -Raw |
            ConvertFrom-Json
          $version = [string]$manifest.version
          $tag = "$env:PLUGIN_ID-v$version"
          $asset = "$env:PLUGIN_ID-$version-win-x64.zip"
          if ([string]$manifest.distribution.tag -ne $tag -or
              [string]$manifest.distribution.asset -ne $asset) {
              throw "Release naming does not match manifest version $version"
          }

          $draft = if ($env:EVENT_NAME -eq "workflow_dispatch") {
              [string]$env:DRAFT_INPUT
          }
          else {
              "false"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset=$asset" >> $env:GITHUB_OUTPUT
          "draft=$($draft.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "prerelease=$($version.Contains('-').ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Reject an already published version
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.manifest.outputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] &&
             [ "${{ github.ref_name }}" != "main" ]; then
            echo "::error::Manual releases must run from main."
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists; bump manifest.version."
            exit 1
          fi

  build:
    name: Test and package automation
    runs-on: windows-latest
    needs: validate
    outputs:
      package_size: ${{ steps.package.outputs.package_size }}
      package_sha256: ${{ steps.package.outputs.package_sha256 }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Test, publish, and verify package
        shell: pwsh
        run: ./plugins/akasha-genshin-automation/packaging/Publish-Plugin.ps1

      - name: Verify package metadata
        id: package
        shell: pwsh
        run: |
          $archive = "artifacts/release/${{ needs.validate.outputs.asset }}"
          $checksum = "$archive.sha256"
          if (-not (Test-Path -LiteralPath $archive -PathType Leaf) -or
              -not (Test-Path -LiteralPath $checksum -PathType Leaf)) {
              throw "Release assets were not generated."
          }
          $expected = (
              (Get-Content -LiteralPath $checksum -Raw) -split '\s+'
          )[0].ToLowerInvariant()
          $actual = (
              Get-FileHash -LiteralPath $archive -Algorithm SHA256
          ).Hash.ToLowerInvariant()
          if ($expected -ne $actual) {
              throw "Generated package checksum does not match."
          }
          "package_size=$((Get-Item -LiteralPath $archive).Length)" >> $env:GITHUB_OUTPUT
          "package_sha256=$actual" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.validate.outputs.tag }}
          path: |
            artifacts/release/${{ needs.validate.outputs.asset }}
            artifacts/release/${{ needs.validate.outputs.asset }}.sha256
          if-no-files-found: error
          retention-days: 14

  github_release:
    name: Create and verify GitHub Release
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: ${{ needs.validate.outputs.tag }}
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Akasha Genshin Automation v${{ needs.validate.outputs.version }}
          draft: ${{ needs.validate.outputs.draft }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/${{ needs.validate.outputs.asset }}
            release/${{ needs.validate.outputs.asset }}.sha256

      - name: Verify GitHub Release readback
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
          ASSET: ${{ needs.validate.outputs.asset }}
          EXPECTED_SIZE: ${{ needs.build.outputs.package_size }}
          EXPECTED_SHA256: ${{ needs.build.outputs.package_sha256 }}
        run: |
          mkdir readback
          gh release download "$TAG" --pattern "$ASSET" --dir readback
          actual_size="$(stat -c%s "readback/$ASSET")"
          actual_sha256="$(sha256sum "readback/$ASSET" | cut -d' ' -f1)"
          test "$actual_size" = "$EXPECTED_SIZE"
          test "$actual_sha256" = "$EXPECTED_SHA256"

  cnb_release:
    name: Create and verify CNB Release
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - github_release
    environment: catalog-publish
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          name: ${{ needs.validate.outputs.tag }}
          path: release

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CNB publisher dependency
        run: python -m pip install --disable-pip-version-check "requests>=2.31.0,<3"

      - name: Create CNB Release and upload assets
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          test -n "$CNB_TOKEN"
          python .github/scripts/publish_cnb_release.py \
            --token "$CNB_TOKEN" \
            --project "AkashaNavigator/akasha-plugins" \
            --version "${{ needs.validate.outputs.version }}" \
            --assets release \
            --draft "${{ needs.validate.outputs.draft }}" \
            --prerelease "${{ needs.validate.outputs.prerelease }}"

      - name: Verify CNB Release readback
        if: needs.validate.outputs.draft == 'false'
        shell: bash
        env:
          ASSET: ${{ needs.validate.outputs.asset }}
          TAG: ${{ needs.validate.outputs.tag }}
          EXPECTED_SIZE: ${{ needs.build.outputs.package_size }}
          EXPECTED_SHA256: ${{ needs.build.outputs.package_sha256 }}
        run: |
          url="https://cnb.cool/AkashaNavigator/akasha-plugins/-/releases/download/$TAG/$ASSET"
          curl --fail --location --retry 6 --retry-delay 5 \
            "$url" --output cnb-readback.zip
          actual_size="$(stat -c%s cnb-readback.zip)"
          actual_sha256="$(sha256sum cnb-readback.zip | cut -d' ' -f1)"
          test "$actual_size" = "$EXPECTED_SIZE"
          test "$actual_sha256" = "$EXPECTED_SHA256"

  publish_catalog:
    name: Publish verified automation catalog
    if: >-
      github.event_name != 'pull_request' &&
      needs.validate.outputs.draft == 'false'
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - github_release
      - cnb_release
    permissions:
      contents: write
    environment: catalog-publish
    concurrency:
      group: publish-catalog
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Prepare verified Release metadata
        shell: python
        env:
          PLUGIN_VERSION: ${{ needs.validate.outputs.version }}
          PLUGIN_ASSET: ${{ needs.validate.outputs.asset }}
          PACKAGE_SIZE: ${{ needs.build.outputs.package_size }}
          PACKAGE_SHA256: ${{ needs.build.outputs.package_sha256 }}
        run: |
          import json
          import os
          from pathlib import Path

          path = Path("artifacts/release-metadata.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          metadata = {
              "pluginId": "akasha-genshin-automation",
              "version": os.environ["PLUGIN_VERSION"],
              "asset": os.environ["PLUGIN_ASSET"],
              "size": int(os.environ["PACKAGE_SIZE"]),
              "sha256": os.environ["PACKAGE_SHA256"],
          }
          path.write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

      - name: Prepare catalog worktree
        shell: bash
        env:
          CATALOG_ROOT: ${{ runner.temp }}/catalog-worktree
        run: |
          git fetch origin catalog
          git worktree add -B catalog "$CATALOG_ROOT" origin/catalog

      - name: Stage verified catalog
        shell: pwsh
        run: >-
          ./build/Publish-Catalog.ps1
          -SourceCommit "${{ github.sha }}"
          -PreviousCatalogDirectory "${{ runner.temp }}/catalog-worktree"
          -ReleaseMetadataPath "artifacts/release-metadata.json"

      - name: Verify staged automation metadata
        shell: python
        env:
          EXPECTED_SIZE: ${{ needs.build.outputs.package_size }}
          EXPECTED_SHA256: ${{ needs.build.outputs.package_sha256 }}
        run: |
          import json
          import os
          from pathlib import Path

          root = Path("artifacts/catalog")
          manifest = json.loads(
              (root / "plugins/akasha-genshin-automation/manifest.json")
              .read_text(encoding="utf-8")
          )
          index = json.loads((root / "repo.json").read_text(encoding="utf-8"))
          distribution = manifest["distribution"]
          assert distribution["size"] == int(os.environ["EXPECTED_SIZE"])
          assert distribution["sha256"] == os.environ["EXPECTED_SHA256"]
          entries = {item["id"]: item for item in index["plugins"]}
          assert entries["akasha-genshin-automation"]["version"] == manifest["version"]
          assert entries["akasha-genshin-automation"]["hasBackend"] is True

      - name: Publish catalog to GitHub and CNB
        shell: bash
        env:
          CATALOG_ROOT: ${{ runner.temp }}/catalog-worktree
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find "$CATALOG_ROOT" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a artifacts/catalog/. "$CATALOG_ROOT/"
          git -C "$CATALOG_ROOT" add --all
          if ! git -C "$CATALOG_ROOT" diff --cached --quiet; then
            git -C "$CATALOG_ROOT" commit \
              -m "catalog: publish ${SOURCE_COMMIT:0:12}"
            git -C "$CATALOG_ROOT" push origin HEAD:catalog
          fi

          credential_file="$RUNNER_TEMP/cnb-git-credentials"
          cleanup_credentials() {
            rm -f "$credential_file"
            git config --global --unset-all credential.helper || true
          }
          trap cleanup_credentials EXIT
          git config --global credential.helper "store --file=$credential_file"
          printf "protocol=https\nhost=cnb.cool\nusername=cnb\npassword=%s\n\n" "$CNB_TOKEN" |
            git credential approve
          git -C "$CATALOG_ROOT" remote add cnb \
            "https://cnb.cool/AkashaNavigator/akasha-plugins"
          git -C "$CATALOG_ROOT" push cnb HEAD:catalog
